name: Ohm Theory Automated Scraper

on:
  schedule:
    - cron: '17,47 13-23,0-2 * * *' # Runs at 13:17, 13:47, 14:17, 14:47, ..., 23:17, 23:47, 00:17, 00:47, 01:17, 01:47, 02:17, 02:47 (every hour from 1 PM to 2 AM)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Scraper
        run: python ohmscraper.py

      - name: Commit and Push Changes
        run: |
          git config user.name "Menu-Scraper-Bot"
          git config user.email "actions@github.com"
          git add products_ohm.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated menu update 🌿" && git push)