steps:
  # 1. Grab your code from the repository
  - name: Checkout repository
    uses: actions/checkout@v4

  # 2. Install Python
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11' 

  # 3. Install Playwright and the headless Chromium browser
  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install playwright
      playwright install chromium

  # 4. Run your scraper script
  - name: Run Scraper
    run: python scraper_ohm.py

  # 5. Check for changes and push if there are any
  - name: Commit and Push Changes
    run: |
      git config user.name "Menu-Scraper-Bot"
      git config user.email "actions@github.com"
      git add products_ohm.json
      
      # This command checks if there are changes. 
      # If yes, it commits and pushes. If no, it does nothing.
      git diff --quiet && git diff --staged --quiet || (git commit -m "Automated menu update 🌿" && git push)
